<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('dir', dir);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Arcane Wonders</title>
    <meta name="description" content="Join the Arcane Inner Circle to unlock exclusive magic tutorials and early access to illusion gear.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonPurple: '#bc13fe',
                        electricBlue: '#00d2ff',
                        mysticPink: '#f626af',
                        gold: '#ffd700',
                        deepBlack: '#050505',
                    }
                }
            }
        }
    </script>
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .glass-form {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px border rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            border-color: #00d2ff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(-2deg); }
        }
        .float-icon { animation: float 7s ease-in-out infinite; }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-deepBlack min-h-screen flex items-center justify-center p-4 overflow-x-hidden">
    <!-- Background Effects -->
    <div class="magic-bg"></div>
    <div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-mysticPink/10 rounded-full blur-[120px] pointer-events-none animate-pulse"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-neonPurple/10 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-delay: 2s;"></div>

    <div class="fixed top-8 right-8 z-50 flex items-center gap-3">
        <button class="theme-toggle-btn w-10 h-10 flex items-center justify-center glass rounded-xl hover:border-electricBlue hover:text-electricBlue transition-all" title="Toggle Theme">
            <i class="ri-sun-line text-xl"></i>
        </button>
        <button class="rtl-toggle-btn w-10 h-10 flex items-center justify-center glass rounded-xl text-xs font-bold hover:border-electricBlue hover:text-electricBlue transition-all" title="Switch Direction">
            RTL
        </button>
    </div>

    <div class="w-full max-w-lg relative z-10 py-12">
        <!-- Signup Card -->
        <div class="glass-form rounded-[2.5rem] p-8 md:p-10 border border-white/10 reveal" id="form-reveal" style="transition-delay: 0.1s;">
            <!-- Logo Inside -->
            <a href="index.html" class="flex items-center justify-center gap-3 mb-10 group">
                <i class="ri-magic-line text-3xl text-neonPurple neon-text-purple group-hover:scale-110 transition-transform"></i>
                <span class="text-2xl font-magic font-bold tracking-wider bg-gradient-to-r from-neonPurple to-electricBlue bg-clip-text text-transparent">ARCANE</span>
            </a>
            
            <h2 class="text-2xl font-bold mb-6 text-center">Create Your Identity</h2>
            
            <form class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">First Name</label>
                    <div class="relative group">
                        <i class="ri-user-magic-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <input type="text" placeholder="Harry" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none input-glow transition-all text-sm text-white">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Last Name</label>
                    <div class="relative group">
                        <i class="ri-user-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <input type="text" placeholder="Houdini" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none input-glow transition-all text-sm text-white">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Email</label>
                    <div class="relative group">
                        <i class="ri-mail-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <input type="email" placeholder="houdini@magic.com" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none input-glow transition-all text-sm text-white">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Specialization</label>
                    <div class="relative group">
                        <i class="ri-fire-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <select class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none input-glow transition-all text-sm appearance-none text-white">
                            <option class="bg-deepBlack">Close-up Magic</option>
                            <option class="bg-deepBlack">Stage Illusions</option>
                            <option class="bg-deepBlack">Mentalism</option>
                            <option class="bg-deepBlack">Cardistry</option>
                        </select>
                        <i class="ri-arrow-down-s-line absolute right-4 top-1/2 -translate-y-1/2 text-white/30"></i>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Master Password</label>
                    <div class="relative group">
                        <i class="ri-lock-2-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-12 py-4 focus:outline-none input-glow transition-all text-sm text-white password-input">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors toggle-password">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Confirm Password</label>
                    <div class="relative group">
                        <i class="ri-shield-check-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-electricBlue transition-colors"></i>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-12 py-4 focus:outline-none input-glow transition-all text-sm text-white password-input">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors toggle-password">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-start gap-2 ml-1 py-2">
                    <input type="checkbox" id="terms" class="mt-1 w-4 h-4 rounded border-white/10 bg-white/5 text-electricBlue focus:ring-electricBlue focus:ring-offset-deepBlack">
                    <label for="terms" class="text-xs text-white/40 leading-relaxed">
                        I agree to the <a href="#" class="text-electricBlue hover:underline">Vow of Secrecy</a> and the Terms of Service.
                    </label>
                </div>

                <button type="submit" class="w-full py-4 bg-electricBlue text-deepBlack rounded-2xl font-bold hover:shadow-[0_0_30px_#00d2ff] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                    <span>Sign-up</span>
                    <i class="ri-user-add-line group-hover:rotate-12 transition-transform"></i>
                </button>
            </form>

            <div class="relative my-8 text-center">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/5"></div>
                </div>
                <span class="relative bg-deepBlack/50 px-4 text-[10px] uppercase font-bold text-white/30 tracking-[0.2em]">Or join with</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-sm font-medium group">
                    <i class="ri-google-fill text-lg group-hover:text-electricBlue transition-colors"></i> Google
                </button>
                <button class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-sm font-medium group">
                    <i class="ri-apple-fill text-lg group-hover:text-white transition-colors"></i> Apple
                </button>
            </div>
        </div>

        <p class="text-center mt-8 text-white/40 text-sm reveal" id="footer-reveal" style="transition-delay: 0.2s;">
            Already part of the legacy? <a href="login.html" class="text-electricBlue font-bold hover:underline transition-all">Login</a>
        </p>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => el.classList.add('active'));

            // Password Toggle
            const toggleBtns = document.querySelectorAll('.toggle-password');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = btn.parentElement.querySelector('input');
                    const icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.replace('ri-eye-line', 'ri-eye-off-line');
                    } else {
                        input.type = 'password';
                        icon.classList.replace('ri-eye-off-line', 'ri-eye-line');
                    }
                });
            });
        });
    </script>
</body>
</html>
