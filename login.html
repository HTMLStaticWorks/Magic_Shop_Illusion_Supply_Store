<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('dir', dir);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Arcane Wonders</title>
    <meta name="description" content="Login to your Arcane account to access exclusive magic secrets and order history.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonPurple: '#bc13fe',
                        electricBlue: '#00d2ff',
                        mysticPink: '#f626af',
                        gold: '#ffd700',
                        deepBlack: '#050505',
                    }
                }
            }
        }
    </script>
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .glass-form {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px border rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            border-color: #bc13fe;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .float-icon { animation: float 6s ease-in-out infinite; }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-deepBlack min-h-screen flex items-center justify-center p-4 overflow-x-hidden">
    <!-- Background Effects -->
    <div class="magic-bg"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-neonPurple/10 rounded-full blur-[120px] pointer-events-none animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-electricBlue/10 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-delay: 2s;"></div>

    <div class="fixed top-8 right-8 z-50 flex items-center gap-3">
        <button class="theme-toggle-btn w-10 h-10 flex items-center justify-center glass rounded-xl hover:border-neonPurple hover:text-neonPurple transition-all" title="Toggle Theme">
            <i class="ri-sun-line text-xl"></i>
        </button>
        <button class="rtl-toggle-btn w-10 h-10 flex items-center justify-center glass rounded-xl text-xs font-bold hover:border-neonPurple hover:text-neonPurple transition-all" title="Switch Direction">
            RTL
        </button>
    </div>

    <div class="w-full max-w-lg relative z-10 py-12">
        <!-- Login Card -->
        <div class="glass-form rounded-[2.5rem] p-8 md:p-10 border border-white/10 reveal" id="form-reveal" style="transition-delay: 0.1s;">
            <!-- Logo Inside -->
            <a href="index.html" class="flex items-center justify-center gap-3 mb-10 group">
                <i class="ri-magic-line text-3xl text-neonPurple neon-text-purple group-hover:scale-110 transition-transform"></i>
                <span class="text-2xl font-magic font-bold tracking-wider bg-gradient-to-r from-neonPurple to-electricBlue bg-clip-text text-transparent">ARCANE</span>
            </a>
            
            <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
            
            <form class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Email Address</label>
                    <div class="relative group">
                        <i class="ri-mail-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-neonPurple transition-colors"></i>
                        <input type="email" placeholder="magician@arcane.com" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none input-glow transition-all text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-xs font-bold text-white/50 uppercase tracking-widest">Password</label>
                    </div>
                    <div class="relative group">
                        <i class="ri-lock-password-line absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-neonPurple transition-colors"></i>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-12 py-4 focus:outline-none input-glow transition-all text-sm text-white">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors toggle-password">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between py-2">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 text-neonPurple focus:ring-neonPurple focus:ring-offset-deepBlack">
                        <label for="remember" class="text-xs text-white/50 cursor-pointer hover:text-white transition-colors">Remember Me</label>
                    </div>
                    <a href="#" class="text-xs text-neonPurple hover:underline">Forgot Password?</a>
                </div>

                <button type="submit" class="w-full py-4 bg-neonPurple rounded-2xl font-bold hover:shadow-[0_0_30_#bc13fe] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                    <span>Login</span>
                    <i class="ri-arrow-right-line group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="relative my-8 text-center">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/5"></div>
                </div>
                <span class="relative bg-deepBlack/50 px-4 text-[10px] uppercase font-bold text-white/30 tracking-[0.2em]">Or continue with</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-sm font-medium group">
                    <i class="ri-google-fill text-lg group-hover:text-electricBlue transition-colors"></i> Google
                </button>
                <button class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-sm font-medium group">
                    <i class="ri-apple-fill text-lg group-hover:text-white transition-colors"></i> Apple
                </button>
            </div>
        </div>

        <p class="text-center mt-8 text-white/40 text-sm reveal" id="footer-reveal" style="transition-delay: 0.2s;">
            Don't have an account? <a href="signup.html" class="text-neonPurple font-bold hover:underline transition-all">Signup</a>
        </p>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => el.classList.add('active'));

            // Password Toggle
            const toggleBtns = document.querySelectorAll('.toggle-password');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = btn.parentElement.querySelector('input');
                    const icon = btn.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.replace('ri-eye-line', 'ri-eye-off-line');
                    } else {
                        input.type = 'password';
                        icon.classList.replace('ri-eye-off-line', 'ri-eye-line');
                    }
                });
            });
        });
    </script>

    

    <!-- Back to Top Button -->
    <button id="back-to-top" class="fixed bottom-8 right-8 z-50 w-14 h-14 rounded-full bg-deepBlack/80 backdrop-blur-md text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] transform translate-y-20 opacity-0 transition-all duration-500 hover:scale-110 hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] focus:outline-none flex items-center justify-center border border-white/10">
        <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
            <circle class="text-white/10" stroke="currentColor" stroke-width="4" fill="transparent" r="45" cx="50" cy="50"></circle>
            <circle id="back-to-top-progress" class="text-neonPurple transition-all duration-100" stroke="currentColor" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round" fill="transparent" r="45" cx="50" cy="50"></circle>
        </svg>
        <i class="ri-arrow-up-line text-2xl relative z-10"></i>
    </button>
</body>
</html>
